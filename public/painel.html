<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GestãoSalão — Painel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0EDE8;
  --surface:#FFFFFF;
  --surface2:#F7F4F0;
  --border:#E8E2DA;
  --border-s:#D4CBC0;
  --text:#1A1410;
  --text2:#6B5F52;
  --text3:#A89880;

  --green:#1A6B3C;--green-bg:#E8F5EE;--green-br:#A8D8BC;--green-light:#F0FAF4;
  --yellow:#8B6000;--yellow-bg:#FFF8E6;--yellow-br:#E8C840;--yellow-light:#FFFBF0;
  --red:#B02020;--red-bg:#FEF0EE;--red-br:#E8A8A0;--red-light:#FFF5F5;
  --blue:#1A4A8B;--blue-bg:#EEF3FF;--blue-br:#A8C0F0;--blue-light:#F5F8FF;
  --gold:#B5893A;--gold-bg:#FBF4E8;--gold-br:#E8D4A0;

  --r:14px;--rs:8px;--shadow:0 2px 8px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.12);--shadow-lg:0 8px 32px rgba(0,0,0,.16);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh}

.app{max-width:960px;margin:0 auto;padding:16px}

/* HEADER */
.app-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:14px 18px;background:var(--text);border-radius:var(--r);box-shadow:var(--shadow-md)}
.logo-wrap{width:52px;height:52px;border-radius:10px;background:white;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.logo-wrap img{width:100%;height:100%;object-fit:cover}
.header-info{flex:1}
.header-info h1{font-size:17px;font-weight:800;color:white;letter-spacing:-.3px}
.header-info p{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.header-menu{display:flex;gap:8px;width:100%}
.menu-btn{flex:1;padding:10px 8px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:white;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;text-align:center;transition:background .15s;-webkit-tap-highlight-color:transparent}
.menu-btn:hover{background:rgba(255,255,255,.2)}
.menu-btn:active{background:rgba(255,255,255,.3)}

/* CONTROLS */
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:flex-end}
.ctrl label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
select{font-size:13px;padding:9px 28px 9px 12px;border-radius:var(--rs);border:1.5px solid var(--border-s);background:var(--surface) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236B5F52' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center;-webkit-appearance:none;color:var(--text);font-weight:600;box-shadow:var(--shadow)}

.main{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
@media(max-width:620px){.app{padding:12px}.main{grid-template-columns:1fr}.header-info h1{font-size:15px}}

/* CALENDÁRIO */
.cal{background:var(--surface);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-md);border:1px solid var(--border)}
.cal-nav{display:flex;align-items:center;margin-bottom:14px}
.cal-nav button{width:34px;height:34px;border-radius:var(--rs);border:1.5px solid var(--border-s);background:var(--surface2);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all .15s}
.cal-nav button:hover{background:var(--border);transform:scale(1.05)}
.cal-title{flex:1;text-align:center;font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdh{font-size:9px;font-weight:800;color:var(--text3);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.06em}
.cd{border-radius:var(--rs);padding:3px 2px;text-align:center;cursor:pointer;border:1.5px solid transparent;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:5px;gap:1px;-webkit-tap-highlight-color:transparent;transition:all .15s;position:relative}
.cd:active{transform:scale(.92)}
.cd .cn{font-size:13px;font-weight:800}
.cd .cl{font-size:7px;line-height:1.2;padding:0 1px;overflow:hidden;white-space:nowrap;max-width:100%}
.cd .cb{width:75%;height:4px;border-radius:2px;margin-top:auto;margin-bottom:2px}
.cd .cf{height:4px;border-radius:2px}

/* DIAS ESPECIAIS NO CAL */
.cd.dom{color:var(--red)}
.cd.sab{background:var(--yellow-light);border-color:var(--yellow-br)}
.cd.hoje{background:var(--blue-light);border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-br)}
.cd.sel{background:var(--text)!important;border-color:var(--text)!important;box-shadow:var(--shadow-md)}
.cd.fer{background:var(--yellow-bg);border-color:var(--yellow-br)}

.leg{display:flex;gap:8px;flex-wrap:wrap;font-size:10px;color:var(--text3);margin-top:12px;padding-top:12px;border-top:1.5px solid var(--border)}
.ldot{width:10px;height:4px;border-radius:2px;display:inline-block;margin-right:2px;vertical-align:middle}

/* ESCALA */
.esc{background:var(--surface);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-md);border:1px solid var(--border)}
.esc-empty{padding:2.5rem 1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;text-align:center;gap:10px}
.esc-empty .ei{font-size:40px;margin-bottom:4px}
.esc-empty p{font-size:14px;color:var(--text2);font-weight:500}
.esc-empty span{font-size:12px;color:var(--text3)}

/* HEADER ESCALA */
.eh{padding:14px 16px;border-bottom:1.5px solid var(--border);background:linear-gradient(135deg,var(--text) 0%,#3A2A1A 100%)}
.edate{font-size:18px;font-weight:800;color:white;letter-spacing:-.3px}
.eturn{font-size:12px;color:rgba(255,255,255,.65);margin-top:3px;font-weight:500}
.head-badges{display:flex;flex-direction:column;gap:4px;align-items:flex-end}

/* MÉTRICAS */
.mrow{display:grid;grid-template-columns:repeat(3,1fr)}
.mc{padding:12px 14px;border-bottom:1.5px solid var(--border)}
.mc:not(:last-child){border-right:1.5px solid var(--border)}
.mc .ml{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.mc .mv{font-size:22px;font-weight:900;color:var(--text);line-height:1;margin-top:4px;letter-spacing:-.5px}
.mc .ms{font-size:10px;color:var(--text3);margin-top:2px;font-weight:500}
.mc.red .mv{color:var(--red)}
.mc.green .mv{color:var(--green)}

/* SEÇÕES */
.sec{padding:12px 16px;border-bottom:1.5px solid var(--border)}
.sec:last-child{border-bottom:none}
.sec.bg2{background:var(--surface2)}
.sec-title{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

/* BADGES */
.bdg{font-size:11px;padding:3px 10px;border-radius:20px;display:inline-block;font-weight:700;border:1.5px solid}
.ok{background:var(--green-bg);color:var(--green);border-color:var(--green-br)}
.wn{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow-br)}
.dn{background:var(--red-bg);color:var(--red);border-color:var(--red-br)}
.in{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-br)}
.gr{background:var(--surface2);color:var(--text2);border-color:var(--border-s)}
.bl{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-br)}

/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;background:var(--blue-light);border:1px solid var(--blue-br);border-radius:20px;padding:4px 10px;margin:2px;color:var(--blue);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.cdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}

/* ALERTAS */
.albox{padding:10px 16px;border-bottom:1.5px solid var(--border);font-size:12px;display:flex;align-items:flex-start;gap:10px;line-height:1.5;font-weight:500}
.aldn{background:var(--red-light);color:var(--red);border-left:4px solid var(--red)}
.alwn{background:var(--yellow-light);color:var(--yellow);border-left:4px solid var(--yellow-br)}
.alin{background:var(--blue-light);color:var(--blue);border-left:4px solid var(--blue)}
.alor{background:var(--gold-bg);color:var(--gold);border-left:4px solid var(--gold-br)}

/* FOLGA CARDS */
.folga-cards{display:flex;flex-direction:column;gap:6px}
.folga-card{border-radius:var(--rs);padding:10px 12px;border-left:4px solid}
.folga-card-hd{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.folga-card-hd .fcdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.folga-card-hd span{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.folga-nomes{display:flex;flex-wrap:wrap;gap:4px}
.folga-nome{font-size:12px;font-weight:700;border-radius:20px;padding:3px 10px;border:1.5px solid}

/* CARDS PRAÇAS E SUPORTE */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.pc{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);padding:12px;box-shadow:var(--shadow);transition:box-shadow .15s;position:relative;overflow:hidden}
.pc::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:var(--green)}
.pc.pp::before{background:var(--gold)}
.pc.px::before{background:var(--red)}
.pc.pf{opacity:.4;border-style:dashed}
.pc.pf::before{display:none}
.pc:hover{box-shadow:var(--shadow-md)}
.pn{font-size:12px;font-weight:800;color:var(--text);margin-bottom:2px}
.ps{font-size:10px;color:var(--text3);margin-bottom:8px;font-weight:500}

/* INPUT RESERVAS */
.rinp{width:72px;font-size:16px;font-weight:800;padding:6px 8px;border-radius:var(--rs);border:2px solid var(--gold-br);background:var(--gold-bg);color:var(--gold);text-align:center;font-family:inherit;box-shadow:var(--shadow)}
.rinp:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-bg)}

/* EXTRA */
.extra-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;background:var(--red-bg);border:1.5px solid var(--red-br);border-radius:20px;padding:3px 9px;margin:2px;color:var(--red);font-weight:700}
.extra-chip button{background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;line-height:1;padding:0;margin-left:2px}
.extra-input-wrap{display:inline-flex;align-items:center;gap:4px;background:var(--red-bg);border:1.5px solid var(--red-br);border-radius:20px;padding:3px 10px;margin:2px}
.extra-input-wrap input{border:none;background:transparent;font-size:12px;color:var(--red);font-family:inherit;width:85px;font-weight:600}
.extra-input-wrap input:focus{outline:none}
.extra-input-wrap input::placeholder{color:var(--red-br);font-weight:400}
.extra-input-wrap button{background:none;border:none;cursor:pointer;color:var(--red);font-size:18px;font-weight:800;padding:0}

/* BOTÃO AUSÊNCIA */
.btn-ausencia{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--yellow);border:1.5px solid var(--yellow-br);border-radius:20px;padding:5px 12px;cursor:pointer;background:var(--yellow-bg);font-family:inherit;font-weight:700;box-shadow:var(--shadow);transition:all .15s}
.btn-ausencia:hover{background:var(--yellow-br);color:white}

/* AUSÊNCIA ITEM */
.aus-item{background:var(--red-light);border:1.5px solid var(--red-br);border-radius:var(--rs);border-left:4px solid var(--red);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px}
.aus-item-nome{font-size:13px;color:var(--red);font-weight:800}
.aus-item-acts{display:flex;gap:6px;flex-shrink:0}
.aus-btn-edit{background:var(--yellow-bg);border:1px solid var(--yellow-br);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--yellow);cursor:pointer;font-weight:700;font-family:inherit}
.aus-btn-rem{background:none;border:none;cursor:pointer;color:var(--red);font-size:20px;line-height:1;padding:0}

/* MODAL */
.mov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;z-index:999;backdrop-filter:blur(2px)}
@media(min-width:480px){.mov{align-items:center;padding:16px}}
.mbox{background:var(--surface);border-radius:var(--r) var(--r) 0 0;padding:22px;width:100%;max-width:440px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
@media(min-width:480px){.mbox{border-radius:var(--r)}}
.mbox h3{font-size:16px;font-weight:800;margin-bottom:4px;color:var(--text)}
.mbox .msub{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.4}
.msel,.minp{width:100%;margin-bottom:10px;font-size:13px;padding:10px 12px;border-radius:var(--rs);border:1.5px solid var(--border-s);background:var(--surface2);color:var(--text);font-family:inherit;font-weight:500}
.msel:focus,.minp:focus{outline:none;border-color:var(--gold);background:var(--surface)}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;flex-wrap:wrap}
.macts button{padding:9px 18px;border-radius:var(--rs);border:1.5px solid var(--border-s);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;font-weight:700;transition:all .15s}
.macts button:hover{background:var(--border)}
.macts .bok{background:var(--text);color:white;border-color:var(--text)}
.macts .bok:hover{background:#3A2A1A}
.macts .bwn{background:var(--yellow);color:white;border-color:var(--yellow)}
.macts .bwp{background:#25D366;color:white;border-color:#25D366}
.macts .brd{background:var(--red);color:white;border-color:var(--red)}

/* FOLGAS MODAL */
.fs-setor{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px;box-shadow:var(--shadow)}
.fs-setor-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.fs-setor-hd:active{background:var(--border)}
.fs-setor-left{display:flex;align-items:center;gap:10px}
.fs-setor-nm{font-size:14px;font-weight:800;color:var(--text)}
.fs-setor-sub{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}
.fs-setor-body{border-top:1.5px solid var(--border);padding:8px}
.fs-func-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:12px 14px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--surface);margin-bottom:6px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;color:var(--text);-webkit-tap-highlight-color:transparent;box-shadow:var(--shadow);transition:all .15s}
.fs-func-btn:last-child{margin-bottom:0}
.fs-func-btn:active{background:var(--surface2);transform:scale(.98)}
.fs-func-right{display:flex;align-items:center;gap:8px}
.fs-func-count{font-size:12px;color:var(--text3);font-weight:500}
.fs-func-count.has{color:var(--green);font-weight:700}

/* CALENDÁRIO MODAL */
.cal-modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-modal-hd h3{font-size:17px;font-weight:800}
.cal-close{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border-s);background:var(--surface2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-m-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-m-nav button{padding:6px 14px;border-radius:var(--rs);border:1.5px solid var(--border-s);background:var(--surface2);cursor:pointer;font-size:18px;font-weight:700;box-shadow:var(--shadow)}
.cal-m-title{font-size:15px;font-weight:800}
.cal-m-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.cal-m-dh{font-size:9px;font-weight:800;color:var(--text3);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.06em}
.cal-m-d{border-radius:var(--rs);min-height:40px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid transparent;-webkit-tap-highlight-color:transparent;transition:all .15s}
.cal-m-d:active{transform:scale(.88)}
.cal-m-d.sel{background:var(--text);color:white;box-shadow:var(--shadow-md)}
.cal-m-d.dom{color:var(--red)}
.cal-m-d.sab{background:var(--yellow-light);color:var(--yellow)}
.cal-m-d.emp{opacity:0;pointer-events:none}
.cal-resumo{font-size:13px;padding:10px 12px;border-radius:var(--rs);margin-bottom:12px;text-align:center;font-weight:700}
.cal-resumo.has{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-br)}
.cal-resumo.empty{background:var(--surface2);color:var(--text3);font-weight:500}
.btn-cal-ok{width:100%;padding:14px;border-radius:var(--rs);border:none;background:var(--text);color:white;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:var(--shadow-md)}

/* TABELA AUSÊNCIAS */
.aus-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}
.aus-table th{background:var(--surface2);padding:9px 10px;text-align:left;font-size:10px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--border)}
.aus-table td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);font-weight:500}
.aus-table tr:last-child td{border-bottom:none}
.aus-table tr:hover td{background:var(--surface2)}
.aus-empty{text-align:center;padding:28px;color:var(--text3);font-size:13px;font-weight:500}
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-row select{flex:1;min-width:120px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:white;border-radius:var(--r);padding:12px 20px;font-size:13px;font-weight:700;z-index:1000;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-lg);white-space:nowrap;max-width:90vw}
/* AGENDA */
.ag-hoje{background:var(--blue-bg);border:1.5px solid var(--blue-br);border-radius:var(--rs);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.ag-hoje-data{font-size:15px;font-weight:800;color:var(--blue)}
.ag-hoje-count{background:var(--blue);color:white;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:800}
.ag-filtros{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.ag-filtro{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border-s);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.ag-filtro.ativo{background:var(--text);color:white;border-color:var(--text)}
.ag-lista{display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto;padding-bottom:8px}
.ag-comp{background:var(--surface2);border-radius:var(--rs);padding:12px 14px;border:1.5px solid var(--border);border-left:4px solid;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ag-comp:active{opacity:.8}
.ag-comp.concluido{opacity:.55}
.ag-comp-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.ag-comp-titulo{font-size:14px;font-weight:800;color:var(--text);line-height:1.2}
.ag-comp-titulo.concluido{text-decoration:line-through;color:var(--text3)}
.ag-comp-meta{font-size:11px;color:var(--text2);font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ag-comp-desc{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.4}
.ag-comp-acts{display:flex;gap:6px;margin-top:8px}
.ag-btn{padding:6px 12px;border-radius:20px;border:1.5px solid;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.ag-day-label{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:8px 0 4px;margin-top:4px}
.ag-empty{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px}
.ag-fab{width:100%;padding:13px;border-radius:var(--rs);border:none;background:var(--text);color:white;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:12px;box-shadow:var(--shadow)}
.tipo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:4px}
.tipo-btn{padding:9px 4px;border-radius:var(--rs);border:1.5px solid var(--border-s);background:var(--surface2);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;-webkit-tap-highlight-color:transparent;transition:all .15s}
.tipo-btn.sel{color:white;border-color:transparent}
</style>

// Persistência no Supabase (gravação otimista: a UI já foi atualizada em memória
// antes dessas chamadas; aqui só refletimos a mudança no banco em segundo plano).
async function persistirFolgaVendida(nome,ds,vendida){
  const funcionarioId=FUNC_ID_POR_NOME[nome];
  if(!funcionarioId)return;
  if(vendida){
    const{error}=await supabaseClient.from("folgas_vendidas").insert({funcionario_id:funcionarioId,data:ds});
    if(error)avisoErro("Não foi possível salvar a venda de folga.");
  }else{
    const{error}=await supabaseClient.from("folgas_vendidas").delete().eq("funcionario_id",funcionarioId).eq("data",ds);
    if(error)avisoErro("Não foi possível desfazer a venda de folga.");
  }
}
async function persistirEscalaManual(ds,dist){
  const{error}=await supabaseClient.from("escala_manual").upsert({restaurante_id:RESTAURANTE_ID,data:ds,distribuicao:dist,updated_at:new Date().toISOString()},{onConflict:"restaurante_id,data"});
  if(error)avisoErro("Não foi possível salvar a escala manual.");
}
async function persistirResetEscalaManual(ds){
  const{error}=await supabaseClient.from("escala_manual").delete().eq("restaurante_id",RESTAURANTE_ID).eq("data",ds);
  if(error)avisoErro("Não foi possível redefinir a escala manual.");
}
async function persistirExtra(alvo,ds,nome,adicionar){
  if(adicionar){
    const{error}=await supabaseClient.from("extras").insert({restaurante_id:RESTAURANTE_ID,alvo,data:ds,nome});
    if(error)avisoErro("Não foi possível salvar o extra.");
  }else{
    const{error}=await supabaseClient.from("extras").delete().eq("restaurante_id",RESTAURANTE_ID).eq("alvo",alvo).eq("data",ds).eq("nome",nome);
    if(error)avisoErro("Não foi possível remover o extra.");
  }
}
async function persistirReserva(ds,turno,quantidade){
  const{error}=await supabaseClient.from("reservas").upsert({restaurante_id:RESTAURANTE_ID,data:ds,turno,quantidade},{onConflict:"restaurante_id,data,turno"});
  if(error)avisoErro("Não foi possível salvar a reserva.");
}
async function persistirAusenciaRange(nome,diasIso,motivo){
  const funcionarioId=FUNC_ID_POR_NOME[nome];
  if(!funcionarioId)return;
  const linhas=diasIso.map(data=>({funcionario_id:funcionarioId,data,motivo}));
  const{error}=await supabaseClient.from("ausencias").insert(linhas);
  if(error)avisoErro("Não foi possível salvar a ausência.");
}
async function persistirRemoverAusencia(nome,ds){
  const funcionarioId=FUNC_ID_POR_NOME[nome];
  if(!funcionarioId)return;
  const{error}=await supabaseClient.from("ausencias").delete().eq("funcionario_id",funcionarioId).eq("data",ds);
  if(error)avisoErro("Não foi possível remover a ausência.");
}
async function persistirFolgasFuncionario(nome,mi,ano,dias){
  const funcionarioId=FUNC_ID_POR_NOME[nome];
  if(!funcionarioId)return;
  const ultimoDia=new Date(ano,mi+1,0).getDate();
  const inicio=`${ano}-${String(mi+1).padStart(2,"0")}-01`;
  const fim=`${ano}-${String(mi+1).padStart(2,"0")}-${String(ultimoDia).padStart(2,"0")}`;
  const{error:delError}=await supabaseClient.from("folgas").delete().eq("funcionario_id",funcionarioId).gte("data",inicio).lte("data",fim);
  if(delError){avisoErro("Não foi possível atualizar as folgas de "+nome+".");return;}
  if(dias.length>0){
    const linhas=dias.map(d=>({funcionario_id:funcionarioId,data:`${ano}-${String(mi+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`}));
    const{error:insError}=await supabaseClient.from("folgas").insert(linhas);
    if(insError)avisoErro("Não foi possível atualizar as folgas de "+nome+".");
  }
}

const ds2s=(m,d)=>`${cy}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

function getSetorFunc(n){for(const[k,eq]of Object.entries(EQ))if(eq.m.includes(n))return eq.l;return "—";}

function eFolga(n,d,mi){
  if((FERIAS[mi]||[]).includes(n))return true;
  if((AUSENCIAS[`${mi}_${d}`]||[]).includes(n))return true;
  // se vendeu a folga, não está de folga
  if((FOLGAS_VENDIDAS[`${mi}_${d}`]||[]).includes(n))return false;
  return(FOLGAS[mi]&&FOLGAS[mi][n])?FOLGAS[mi][n].includes(d):false;
}
function gDisp(d,mi,k){return EQ[k].m.filter(g=>!eFolga(g,d,mi));}
function calcPax(mi,d,tu){
  const dn=dnom(mi,d),ds=ds2s(mi,d),fer=nFer(ds);
  if(FJ.includes(dn)&&tu==="j")return 0;
  if(fer)return CAA;
  const base=PAX[dn][tu],res=gRes(mi,d,tu);
  return Math.max(base,res>0?Math.round(base*0.7+res*1.1):base);
}
function tFolgas(d,mi){
  const res={};
  const ausentes=AUSENCIAS[`${mi}_${d}`]||[];
  const vendidas=FOLGAS_VENDIDAS[`${mi}_${d}`]||[];
  Object.keys(EQ).forEach(k=>{
    const emF=EQ[k].m.filter(g=>{
      if(ausentes.includes(g))return false;
      if((FERIAS[mi]||[]).includes(g))return false;
      if(vendidas.includes(g))return false;
      return(FOLGAS[mi]&&FOLGAS[mi][g])?FOLGAS[mi][g].includes(d):false;
    });
    if(emF.length)res[k]=emF;
  });
  return res;
}
function getFolgasVendidas(d,mi){return FOLGAS_VENDIDAS[`${mi}_${d}`]||[];}
function venderFolga(nome,d,mi){
  const k=`${mi}_${d}`;
  if(!FOLGAS_VENDIDAS[k])FOLGAS_VENDIDAS[k]=[];
  if(!FOLGAS_VENDIDAS[k].includes(nome))FOLGAS_VENDIDAS[k].push(nome);
  persistirFolgaVendida(nome,ds2s(mi,d),true);
  renderEsc(d,mi);renderCal();
  showToast("✅ Folga vendida — "+nome+" escalado!");
}
function cancelarVendaFolga(nome,d,mi){
  const k=`${mi}_${d}`;
  if(FOLGAS_VENDIDAS[k])FOLGAS_VENDIDAS[k]=FOLGAS_VENDIDAS[k].filter(n=>n!==nome);
  persistirFolgaVendida(nome,ds2s(mi,d),false);
  renderEsc(d,mi);renderCal();
  showToast("↩ Folga restaurada para "+nome);
}
function totalFolgas(d,mi){return Object.values(tFolgas(d,mi)).reduce((s,v)=>s+v.length,0);}
function getExtras(id,d,mi){return EXTRAS[`${id}_${mi}_${d}`]||[];}
function getEscalaManual(d,mi){return ESCALA_MANUAL[`${mi}_${d}`]||null;}
function setEscalaManual(d,mi,dist){ESCALA_MANUAL[`${mi}_${d}`]=dist;persistirEscalaManual(ds2s(mi,d),dist);}
function resetEscalaManual(d,mi){delete ESCALA_MANUAL[`${mi}_${d}`];persistirResetEscalaManual(ds2s(mi,d));}
function addExtra(id,d,mi,nome){const k=`${id}_${mi}_${d}`;if(!EXTRAS[k])EXTRAS[k]=[];if(nome&&!EXTRAS[k].includes(nome)){EXTRAS[k].push(nome);persistirExtra(id,ds2s(mi,d),nome,true);}}
function delExtra(id,d,mi,nome){const k=`${id}_${mi}_${d}`;if(EXTRAS[k]){EXTRAS[k]=EXTRAS[k].filter(n=>n!==nome);persistirExtra(id,ds2s(mi,d),nome,false);}}

function distribuicaoAutomatica(dg){
  const dist={};
  PD.forEach(p=>{dist[p.id]=[];});
  const al=new Set();
  PD.filter(p=>!p.fch).forEach(p=>{(p.gc||[]).forEach(g=>{if(dg.includes(g)&&!al.has(g)){dist[p.id].push(g);al.add(g);}});});
  PD.filter(p=>!p.fch&&!p.fimSemana).forEach(p=>{dg.forEach(g=>{if(!al.has(g)){dist[p.id].push(g);al.add(g);}});});
  return dist;
}

  const escManual=getEscalaManual(d,mi);
  let distAtual;
  if(escManual){
    distAtual=JSON.parse(JSON.stringify(escManual));
  } else {
    const dg=EQ.garcons.m.filter(g=>!eFolga(g,d,mi));
    distAtual=distribuicaoAutomatica(dg);
  }
  renderModalEscala(d,mi,distAtual);
}
function getTodosDisponiveis(d,mi){
  // garçons + toda equipe de suporte disponível no dia
  const todos=[];
  Object.keys(EQ).forEach(k=>{
    EQ[k].m.forEach(g=>{
      if(!eFolga(g,d,mi)) todos.push({nome:g,setor:EQ[k].l,cor:EQ[k].c});
    });
  });
  return todos;
}

  PD.filter(p=>!p.fch&&(!p.fimSemana||isSabDomFer)).forEach(p=>{
    const isAberta=pracaSel===p.id;
    h+=`<div style="background:var(--surface2);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px;border:1.5px solid ${isAberta?"var(--gold)":"var(--border)"}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">

function getDistBase(d,mi){
  const dg=EQ.garcons.m.filter(g=>!eFolga(g,d,mi));
  return distribuicaoAutomatica(dg);
}
function removerDaPraca(pid,nome,d,mi){
  const escManual=getEscalaManual(d,mi);
  const dist=escManual?JSON.parse(JSON.stringify(escManual)):getDistBase(d,mi);
  if(dist[pid]) dist[pid]=dist[pid].filter(n=>n!==nome);
  setEscalaManual(d,mi,dist);
  renderModalEscala(d,mi,dist);
}
function moverParaPraca(pid,nome,d,mi){
  if(!nome) return;
  const escManual=getEscalaManual(d,mi);
  const dist=escManual?JSON.parse(JSON.stringify(escManual)):getDistBase(d,mi);
  Object.keys(dist).forEach(k=>{dist[k]=dist[k].filter(n=>n!==nome);});
  if(!dist[pid]) dist[pid]=[];
  dist[pid].push(nome);
  setEscalaManual(d,mi,dist);
  renderModalEscala(d,mi,dist);
}

      </div>

function confirmarAusencia(d,mi){
  const func=document.getElementById("aus-func").value;
  const motivo=document.getElementById("aus-motivo").value;
  const iniStr=document.getElementById("aus-ini").value;
  const fimStr=document.getElementById("aus-fim").value;
  if(!func){alert("Selecione um funcionário.");return;}
  if(!iniStr||!fimStr){alert("Informe o período.");return;}
  const iniDate=new Date(iniStr+"T12:00:00"),fimDate=new Date(fimStr+"T12:00:00");
  if(fimDate<iniDate){alert("Data fim não pode ser anterior ao início.");return;}
  let dias=0;
  const diasIso=[];
  const cur=new Date(iniDate);
  while(cur<=fimDate){
    const mes=cur.getMonth(),dia=cur.getDate(),ano=cur.getFullYear();
    const k=`${mes}_${dia}`;
    if(!AUSENCIAS[k])AUSENCIAS[k]=[];
    if(!AUSENCIAS[k].includes(func))AUSENCIAS[k].push(func);
    const ds=`${ano}-${String(mes+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;
    if(!HISTORICO.find(h=>h.func===func&&h.ds===ds))HISTORICO.push({func,ds,motivo,setor:getSetorFunc(func)});
    diasIso.push(ds);
    dias++;cur.setDate(cur.getDate()+1);
  }
  cMod();renderEsc(d,mi);renderCal();
  showToast(dias>1?`⚠️ ${dias} dias registrados para ${func}`:`⚠️ Ausência: ${func}`);
  persistirAusenciaRange(func,diasIso,motivo);
}

      <h3>🗑️ Remover ausência</h3>
      <p class="msub">Tem certeza que deseja remover a ausência de <strong>${nome}</strong>? Esta ação não pode ser desfeita.</p>
      <div class="macts"><button onclick="cMod()">Cancelar</button><button class="brd" onclick="confirmarRemAusencia('${nome}',${d},${mi})">Sim, remover</button></div>
    </div></div>`;
}

function confirmarRemAusencia(nome,d,mi){
  const k=`${mi}_${d}`;
  if(AUSENCIAS[k])AUSENCIAS[k]=AUSENCIAS[k].filter(n=>n!==nome);
  cMod();renderEsc(d,mi);renderCal();
  showToast("✅ Ausência de "+nome+" removida");
  persistirRemoverAusencia(nome,ds2s(mi,d));
}

function salvarEdicaoAusencia(nome,d,mi){
  const motivo=document.getElementById("ed-motivo").value;
  const iniStr=document.getElementById("ed-ini").value,fimStr=document.getElementById("ed-fim").value;
  if(!iniStr||!fimStr){alert("Informe o período.");return;}
  const iniDate=new Date(iniStr+"T12:00:00"),fimDate=new Date(fimStr+"T12:00:00");
  if(fimDate<iniDate){alert("Data fim não pode ser anterior ao início.");return;}
  const dsAntiga=ds2s(mi,d);
  const kAtual=`${mi}_${d}`;
  if(AUSENCIAS[kAtual])AUSENCIAS[kAtual]=AUSENCIAS[kAtual].filter(n=>n!==nome);
  HISTORICO=HISTORICO.filter(h=>h.func!==nome);
  const diasIso=[];
  const cur=new Date(iniDate);
  while(cur<=fimDate){
    const mes=cur.getMonth(),dia=cur.getDate(),ano=cur.getFullYear();
    const k=`${mes}_${dia}`;
    if(!AUSENCIAS[k])AUSENCIAS[k]=[];
    if(!AUSENCIAS[k].includes(nome))AUSENCIAS[k].push(nome);
    const ds=`${ano}-${String(mes+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;
    HISTORICO.push({func:nome,ds,motivo,setor:getSetorFunc(nome)});
    diasIso.push(ds);
    cur.setDate(cur.getDate()+1);
  }
  cMod();renderEsc(d,mi);renderCal();
  showToast("✅ Ausência de "+nome+" atualizada");
  persistirRemoverAusencia(nome,dsAntiga).then(()=>persistirAusenciaRange(nome,diasIso,motivo));
}

  else{
    h+=`<table class="aus-table"><thead><tr><th>Data</th><th>Funcionário</th><th>Setor</th><th>Motivo</th></tr></thead><tbody>${dados.map(r=>`<tr><td>${fmtData(r.ds)}</td><td style="font-weight:700">${r.func}</td><td style="color:var(--text2)">${r.setor}</td><td>${r.motivo}</td></tr>`).join("")}</tbody></table>`;
    if(filtroFunc==="todos"){
      const cont={};dados.forEach(r=>{cont[r.func]=(cont[r.func]||0)+1;});
      h+=`<div style="margin-bottom:12px"><div class="sec-title" style="margin-bottom:8px">Resumo</div>${Object.entries(cont).sort((a,b)=>b[1]-a[1]).map(([n,c])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="font-weight:600">${n}</span><span style="font-weight:800;color:${c>=3?"var(--red)":c>=2?"var(--yellow)":"var(--green)"}">${c} ausência${c!==1?"s":""}</span></div>`).join("")}</div>`;
    }
    const txt=gerarTextoWA(dados,filtroFunc,filtroMes);
    h+=`<div class="macts"><button onclick="cMod()">Fechar</button><button class="bwp" onclick="copiarWA()">📲 Copiar para WhatsApp</button></div>
    <textarea id="wa-text" style="position:absolute;left:-9999px">${txt}</textarea>`;
  }
  if(!dados.length)h+=`<div class="macts"><button onclick="cMod()">Fechar</button></div>`;
  h+=`</div></div>`;
  document.getElementById("modal").innerHTML=h;

function gerarTextoWA(dados,filtroFunc,filtroMes){
  let txt=`*${filtroFunc!=="todos"?"Ausências — "+filtroFunc:"Relatório de Ausências — "+RESTAURANTE_NOME}*

`;
  dados.forEach(r=>{txt+=`📅 ${fmtData(r.ds)} — *${r.func}*
   ${r.motivo}
`;});
  if(filtroFunc==="todos"){const c={};dados.forEach(r=>{c[r.func]=(c[r.func]||0)+1;});txt+=`
*Resumo:*
`;Object.entries(c).sort((a,b)=>b[1]-a[1]).forEach(([n,v])=>{txt+=`• ${n}: ${v} ausência${v!==1?"s":""}
`;});}
  txt+=`
_Total: ${dados.length} registro${dados.length!==1?"s":""}_`;
  return txt;
}
function copiarWA(){const el=document.getElementById("wa-text");if(!el)return;el.select();try{document.execCommand("copy");showToast("✅ Copiado! Cole no WhatsApp");}catch(e){navigator.clipboard?.writeText(el.value).then(()=>showToast("✅ Copiado!")).catch(()=>showToast("Copie o texto manualmente"));}}

function renderCalFunc(){
  const tot=new Date(fsAno,fsMes+1,0).getDate(),off=new Date(fsAno,fsMes,1).getDay();

  ["D","S","T","Q","Q","S","S"].forEach(d=>{h+=`<div class="cal-m-dh">${d}</div>`;});
  for(let i=0;i<off;i++) h+=`<div class="cal-m-d emp"></div>`;
  for(let d=1;d<=tot;d++){

function agHoje(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function agIsHoje(ds){return ds===agHoje();}
function agIsSemana(ds){
  const now=new Date(),ini=new Date(now);ini.setDate(now.getDate()-now.getDay());
  const fim=new Date(ini);fim.setDate(ini.getDate()+6);
  const dt=new Date(ds+"T12:00:00");return dt>=ini&&dt<=fim;
}
function agFmtData(ds){const[y,m,d]=ds.split("-");return `${d}/${m}/${y}`;}
function agFmtDia(ds){const dt=new Date(ds+"T12:00:00");return DS_SEM[dt.getDay()];}
function agFmtDiaCompleto(ds){const dt=new Date(ds+"T12:00:00");const[y,m,d]=ds.split("-");return `${DS_SEM[dt.getDay()]}, ${parseInt(d)} de ${MN[parseInt(m)-1]}`;}
function agGenId(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function agGetFiltrados(){
  let l=[...AGENDA];
  if(agFiltro==="hoje") l=l.filter(c=>agIsHoje(c.data));
  else if(agFiltro==="semana") l=l.filter(c=>agIsSemana(c.data));
  else if(agFiltro==="pendente") l=l.filter(c=>!c.concluido);
  else if(agFiltro==="proximos7"){
    const hoje=agHoje();
    const fim=new Date();fim.setDate(fim.getDate()+7);
    const fimStr=fim.toISOString().split("T")[0];
    l=l.filter(c=>c.data>=hoje&&c.data<=fimStr&&!c.concluido);
  }
  else if(["reuniao","tarefa","compromisso","operacao","outro"].includes(agFiltro)) l=l.filter(c=>c.tipo===agFiltro);
  l=l.sort((a,b)=>{if(a.data!==b.data)return a.data.localeCompare(b.data);if(a.hora&&b.hora)return a.hora.localeCompare(b.hora);return 0;});

  // recorrentes: mostrar APENAS a próxima ocorrência (hoje ou futura)
  const gruposVistos={};
  const resultado=[];
  const hoje=agHoje();
  l.forEach(c=>{
    if(!c.grupoId){resultado.push(c);return;}
    if(!gruposVistos[c.grupoId]&&c.data>=hoje){
      gruposVistos[c.grupoId]=true;
      resultado.push({...c,_primeiroDoGrupo:true});
    }
  });
  return resultado;
}

      <h3>${agEditId?"✏️ Editar":"➕ Novo compromisso"}</h3>
      <div class="field" style="margin-bottom:14px"><label>Tipo</label>
        <div class="tipo-grid">${Object.entries(AG_TIPOS).map(([k,t])=>`
          <button class="tipo-btn${agTipo===k?" sel":""}" style="${agTipo===k?"background:"+t.cor+";border-color:"+t.cor+";":""}" onclick="agSelTipo('${k}','${(c.titulo||"").replace(/'/g,"\'")}','${c.data||agHoje()}','${c.hora||""}','${c.prioridade||"normal"}','${(c.desc||"").replace(/'/g,"\'")}','${c.recorrencia||"nunca"}')">
            ${t.emoji}<br><span style="font-size:10px">${t.label}</span>
          </button>`).join("")}
        </div>
      </div>
      <div class="field">
        <label style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">Título</label>
        <input type="text" id="ag-titulo" placeholder="Nome do compromisso..." value="${c.titulo||""}" style="width:100%;font-size:15px;padding:10px 12px;border-radius:var(--rs);border:1.5px solid var(--border-s);background:var(--surface2);color:var(--text);font-family:inherit;font-weight:500">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div>
          <label style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">Data</label>
          <input type="date" id="ag-data-display" value="${c.data||agHoje()}" style="width:100%;font-size:14px;padding:10px 12px;border-radius:var(--rs);border:1.5px solid var(--border-s);background:var(--surface2);color:var(--text);font-family:inherit;-webkit-appearance:none">
        </div>
        <div>
          <label style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">Horário</label>
          <input type="time" id="ag-hora" value="${c.hora||""}" style="width:100%;font-size:14px;padding:10px 12px;border-radius:var(--rs);border:1.5px solid var(--border-s);background:var(--surface2);color:var(--text);font-family:inherit;-webkit-appearance:none">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div>
          <label style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">Prioridade</label>
          <select id="ag-prior" style="width:100%;font-size:13px;padding:10px 12px;border-radius:var(--rs);border:1.5px solid var(--border-s);background:var(--surface2);color:var(--text);font-family:inherit;-webkit-appearance:none">
            <option value="normal"${c.prioridade==="normal"?" selected":""}>Normal</option>
            <option value="alta"${c.prioridade==="alta"?" selected":""}>Urgente</option>
          </select>
        </div>
        <div>
          <label style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">Repetir</label>
          <select id="ag-recor" style="width:100%;font-size:13px;padding:10px 12px;border-radius:var(--rs);border:1.5px solid var(--border-s);background:var(--surface2);color:var(--text);font-family:inherit;-webkit-appearance:none">
            <option value="nunca"${(c.recorrencia||"nunca")==="nunca"?" selected":""}>Não repetir</option>
            <option value="semanal"${(c.recorrencia||"")==="semanal"?" selected":""}>Toda semana</option>
            <option value="quinzenal"${(c.recorrencia||"")==="quinzenal"?" selected":""}>Quinzenal</option>
            <option value="mensal"${(c.recorrencia||"")==="mensal"?" selected":""}>Todo mês</option>
          </select>
        </div>
      </div>
      <div class="macts"><button onclick="renderAgendaModal()">Cancelar</button><button class="bok" onclick="agSalvar()">Salvar</button></div>
    </div></div>`;
}
function agSelTipo(k,titulo,data,hora,prior,desc,recor){
  agTipo=k;
  renderAgendaForm({titulo,data,hora,prioridade:prior,desc,tipo:k,recorrencia:recor||"nunca"});
}
function agParseData(val){
  // aceita DD/MM/AAAA
  const parts=val.split("/");
  if(parts.length===3&&parts[2].length===4){
    const iso=`${parts[2]}-${parts[1].padStart(2,"0")}-${parts[0].padStart(2,"0")}`;
    const el=document.getElementById("ag-data");
    if(el) el.value=iso;
  }
}
function agSalvar(){
  const titulo=document.getElementById("ag-titulo").value.trim();
  // ler data do campo display e converter DD/MM/AAAA → AAAA-MM-DD
  const dispEl=document.getElementById("ag-data-display");
  let data=dispEl&&dispEl.value?dispEl.value:agHoje();
  if(!titulo){alert("Informe o título.");return;}
  const recorrencia=document.getElementById("ag-recor").value;
  const hora=document.getElementById("ag-hora").value;
  const tipo=agTipo;
  const prioridade=document.getElementById("ag-prior").value;
  const descEl=document.getElementById("ag-desc");const desc=descEl?descEl.value.trim():"";

  // se editando, remove o antigo e suas recorrências geradas
  if(agEditId){
    const orig=AGENDA.find(x=>x.id===agEditId);
    const grupoId=orig?.grupoId||agEditId;
    AGENDA=AGENDA.filter(x=>x.grupoId!==grupoId&&x.id!==agEditId);
  }

  const grupoId=agGenId();
  const comp={
    id:agEditId||agGenId(),titulo,data,hora,tipo,prioridade,desc,
    recorrencia,grupoId:recorrencia!=="nunca"?grupoId:null,
    concluido:false,
  };
  AGENDA.push(comp);

  // gerar próximas ocorrências (até 6 meses)
  if(recorrencia!=="nunca"){
    const intervalos={semanal:7,quinzenal:14,mensal:30};
    const dias=intervalos[recorrencia]||7;
    let cur=new Date(data+"T12:00:00");
    const limite=new Date(cur);limite.setMonth(limite.getMonth()+6);
    for(let i=0;i<50;i++){
      if(recorrencia==="mensal") cur.setMonth(cur.getMonth()+1);
      else cur.setDate(cur.getDate()+dias);
      if(cur>limite) break;
      const ds=cur.toISOString().split("T")[0];
      AGENDA.push({id:agGenId(),titulo,data:ds,hora,tipo,prioridade,desc,recorrencia,grupoId,concluido:false});
    }
  }

  salvarAgenda();renderAgendaModal();renderEmpty();
  const msg=recorrencia!=="nunca"?`✅ Compromisso recorrente criado!`:`✅ ${agEditId?"Atualizado":"Compromisso adicionado"}`;
  showToast(msg);
  agEditId=null;
}

function agConcluir(id){const c=AGENDA.find(x=>x.id===id);if(c){c.concluido=true;salvarAgenda();renderAgendaModal();renderEmpty();showToast("✅ Concluído!");}}
function agReabrir(id){const c=AGENDA.find(x=>x.id===id);if(c){c.concluido=false;salvarAgenda();renderAgendaModal();renderEmpty();showToast("↩ Reaberto");}}
function agExcluir(id){
  const c=AGENDA.find(x=>x.id===id);
  const temGrupo=c&&c.grupoId;
  document.getElementById("modal").innerHTML=`<div class="mov" onclick="if(event.target===this)renderAgendaModal()"><div class="mbox">
    <h3>🗑️ Excluir compromisso</h3>
    <p class="msub">Como deseja excluir?</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px">
      <button class="ag-btn" style="background:var(--red-bg);color:var(--red);border-color:var(--red-br);padding:12px;font-size:13px" onclick="agConfExcluir('${id}',false)">Apenas este compromisso</button>
      ${temGrupo?`<button class="ag-btn" style="background:var(--red);color:white;border-color:var(--red);padding:12px;font-size:13px" onclick="agConfExcluir('${id}',true)">Excluir todos da série</button>`:""}
    </div>
    <div class="macts"><button onclick="renderAgendaModal()">Cancelar</button></div>
  </div></div>`;
}
function agConfExcluir(id,todos){
  const c=AGENDA.find(x=>x.id===id);
  if(todos&&c&&c.grupoId) AGENDA=AGENDA.filter(x=>x.grupoId!==c.grupoId);
  else AGENDA=AGENDA.filter(x=>x.id!==id);
  salvarAgenda();renderAgendaModal();renderEmpty();
  showToast(todos?"🗑️ Série excluída":"🗑️ Excluído");
}

async function carregarHistorico(){
  const{data,error}=await supabaseClient
    .from("ausencias")
    .select("data,motivo,funcionarios(nome)")
    .order("data");
  if(error){avisoErro("Não foi possível carregar o histórico de ausências.");return;}
  HISTORICO=(data||[]).map(r=>({
    func:r.funcionarios?r.funcionarios.nome:"",
    ds:r.data,
    motivo:r.motivo,
    setor:getSetorFunc(r.funcionarios?r.funcionarios.nome:""),
  })).filter(h=>h.func);
}

function recalcAusenciasDoMes(){
  AUSENCIAS={};
  HISTORICO.forEach(h=>{
    const[ano,mes,dia]=h.ds.split("-").map(Number);
    if(ano!==cy)return;
    const key=`${mes-1}_${dia}`;
    if(!AUSENCIAS[key])AUSENCIAS[key]=[];
    if(!AUSENCIAS[key].includes(h.func))AUSENCIAS[key].push(h.func);
  });
}

async function carregarOperacional(){
  const ultimoDia=new Date(cy,cm+1,0).getDate();
  const inicio=`${cy}-${String(cm+1).padStart(2,"0")}-01`;
  const fim=`${cy}-${String(cm+1).padStart(2,"0")}-${String(ultimoDia).padStart(2,"0")}`;

  FOLGAS={};RES={};EXTRAS={};ESCALA_MANUAL={};FOLGAS_VENDIDAS={};

  const[folgasRes,resRes,extrasRes,escalaRes,fvRes]=await Promise.all([
    supabaseClient.from("folgas").select("data,funcionarios(nome)").gte("data",inicio).lte("data",fim),
    supabaseClient.from("reservas").select("*").eq("restaurante_id",RESTAURANTE_ID).gte("data",inicio).lte("data",fim),
    supabaseClient.from("extras").select("*").eq("restaurante_id",RESTAURANTE_ID).gte("data",inicio).lte("data",fim),
    supabaseClient.from("escala_manual").select("*").eq("restaurante_id",RESTAURANTE_ID).gte("data",inicio).lte("data",fim),
    supabaseClient.from("folgas_vendidas").select("data,funcionarios(nome)").gte("data",inicio).lte("data",fim),
  ]);

  FOLGAS[cm]=FOLGAS[cm]||{};
  (folgasRes.data||[]).forEach(r=>{
    const nome=r.funcionarios?r.funcionarios.nome:null;if(!nome)return;
    const dia=parseInt(r.data.split("-")[2],10);
    if(!FOLGAS[cm][nome])FOLGAS[cm][nome]=[];
    FOLGAS[cm][nome].push(dia);
  });

  (resRes.data||[]).forEach(r=>{
    const dia=parseInt(r.data.split("-")[2],10);
    RES[`${cm}_${dia}_${r.turno==="almoco"?"a":"j"}`]=r.quantidade;
  });

  (extrasRes.data||[]).forEach(r=>{
    const dia=parseInt(r.data.split("-")[2],10);
    const k=`${r.alvo}_${cm}_${dia}`;
    if(!EXTRAS[k])EXTRAS[k]=[];
    EXTRAS[k].push(r.nome);
  });

  (escalaRes.data||[]).forEach(r=>{
    const dia=parseInt(r.data.split("-")[2],10);
    ESCALA_MANUAL[`${cm}_${dia}`]=r.distribuicao;
  });

  (fvRes.data||[]).forEach(r=>{
    const nome=r.funcionarios?r.funcionarios.nome:null;if(!nome)return;
    const dia=parseInt(r.data.split("-")[2],10);
    const k=`${cm}_${dia}`;
    if(!FOLGAS_VENDIDAS[k])FOLGAS_VENDIDAS[k]=[];
    FOLGAS_VENDIDAS[k].push(nome);
  });

  recalcAusenciasDoMes();
}

async function boot(){
  const{data:sessionData}=await supabaseClient.auth.getSession();
  if(!sessionData.session){window.location.href="login";return;}

  const{data:restaurante,error:restError}=await supabaseClient
    .from("restaurantes").select("*").eq("owner_id",sessionData.session.user.id).maybeSingle();
  if(restError||!restaurante){window.location.href="onboarding.html";return;}

  RESTAURANTE_ID=restaurante.id;
  RESTAURANTE_NOME=restaurante.nome;
  document.title=RESTAURANTE_NOME+" — Gestão de Salão";
  const h1=document.querySelector(".header-info h1");if(h1)h1.textContent=RESTAURANTE_NOME;
  const sub=document.querySelector(".header-info p");if(sub)sub.textContent=(restaurante.cidade||"")+" · Gestão de Salão";

  const{data:setoresRows}=await supabaseClient
    .from("setores")
    .select("*, funcionarios(id,nome,praca_preferencial_id)")
    .eq("restaurante_id",RESTAURANTE_ID)
    .order("ordem");

  EQ={};FUNC_ID_POR_NOME={};
  const pracaPreferidaPorFuncionario={};
  (setoresRows||[]).forEach(s=>{
    EQ[s.chave]={l:s.nome,e:s.emoji||"",c:s.cor||"#4A4A4A",min:s.min_funcionarios||1,m:[]};
    (s.funcionarios||[]).forEach(f=>{
      EQ[s.chave].m.push(f.nome);
      FUNC_ID_POR_NOME[f.nome]=f.id;
      if(f.praca_preferencial_id){
        if(!pracaPreferidaPorFuncionario[f.praca_preferencial_id])pracaPreferidaPorFuncionario[f.praca_preferencial_id]=[];
        pracaPreferidaPorFuncionario[f.praca_preferencial_id].push(f.nome);
      }
    });
  });

  const{data:pracasRows}=await supabaseClient
    .from("pracas").select("*").eq("restaurante_id",RESTAURANTE_ID).order("ordem");
  PD=(pracasRows||[]).map(p=>({
    id:p.id,n:p.nome,pref:false,fch:false,
    gc:pracaPreferidaPorFuncionario[p.id]||[],
    mesas:"",tm:p.mesas,tl:p.lugares,fimSemana:!!p.fim_semana,
  }));
  recalcTotais();

  const{data:paxRows}=await supabaseClient
    .from("pax_esperado").select("*").eq("restaurante_id",RESTAURANTE_ID);
  (paxRows||[]).forEach(r=>{
    if(!PAX[r.dia_semana])PAX[r.dia_semana]={a:0,j:0};
    PAX[r.dia_semana][r.turno==="almoco"?"a":"j"]=r.quantidade;
  });

  const{data:fechadosRows}=await supabaseClient
    .from("dias_fechados").select("*").eq("restaurante_id",RESTAURANTE_ID);
  FJ=(fechadosRows||[]).filter(r=>r.turno==="jantar"||r.turno==="todos").map(r=>r.dia_semana);

  await carregarHistorico();
  await carregarOperacional();

  carregarAgenda();
  renderCal();renderEmpty();
}

boot();
</script>
